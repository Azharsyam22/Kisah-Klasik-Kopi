<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kisah Klasik Kopi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:wght@600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-[#F4ECD8] text-[#2C1E16]">
    <div id="root"></div>
    <script>
      (function () {
        var base = "/Kisah-Klasik-Kopi/";
        var hasHash = window.location.hash && window.location.hash !== "#";
        if (!hasHash && window.location.pathname.endsWith(base)) {
          window.location.replace(base + "#/");
        }
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
